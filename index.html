<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Sports Player ❤️</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3, #4f46e5);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 950px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(90deg, #ec4899, #6366f1);
            color: white;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        video {
            width: 100%;
            background: black;
        }

        .message {
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 18px;
            background: #18181b;
            line-height: 1.6;
        }

        .heart {
            color: #ff4d6d;
        }
    </style>
</head>
<body>

<div class="player-container">

    <div class="header">
        <h1>❤️ Family Sports Player ❤️</h1>
        <p>For my beloved wife and my cute brother Shariful</p>
    </div>

    <video id="video" controls autoplay></video>

    <div class="message">
        <span class="heart">❤️</span>
        Dedicated to my wonderful wife and my cute brother Shariful.
        May you always stay happy, healthy, and enjoy every moment together.
        <span class="heart">❤️</span>
    </div>

</div>

<script>
    const video = document.getElementById('video');
    const videoSrc = "https://lidapotenmsbh.s3.us-east-1.amazonaws.com/btsport.m3u8";

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function () {
            video.play();
        });
    }
</script>

</body>
</html>
